name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test (macOS arm64)
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}

      - name: Install frontend deps
        run: npm ci

      - name: Rust tests (offline-safe; aura/network tests are #[ignore])
        working-directory: app/src-tauri
        run: cargo test --locked

      - name: Frontend typecheck + build
        run: npm run build

      - name: Bundle .app (release)
        # Build only the .app on CI. The .dmg step (bundle_dmg.sh) drives Finder via
        # AppleScript to lay out the disk-image window, which needs a GUI session and
        # fails on headless runners. This still verifies the full release compile +
        # .app bundling; the signed .dmg is produced locally for GitHub Releases.
        run: npm run tauri build -- --bundles app
