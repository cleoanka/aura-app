<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
<rect x="0" y="0" width="1200" height="430" rx="14" fill="#17171c"/>
<rect x="0.5" y="0.5" width="1199" height="429" rx="14" fill="none" stroke="#343440"/>
<text x="40" y="50" fill="#a7a7b4" font-size="12" font-weight="700" text-anchor="start" letter-spacing="2">AURA MODE</text>
<text x="40" y="84" fill="#ececf1" font-size="26" font-weight="800" text-anchor="start">plan · review · fix · ship</text>
<text x="40" y="110" fill="#a7a7b4" font-size="14" font-weight="400" text-anchor="start">Plan is the safe default — you must opt in to change files, and it never commits.</text>
<rect x="40" y="150" width="265" height="230" rx="12" fill="#202027" stroke="#343440" stroke-width="1"/>
<rect x="40" y="150" width="265" height="5" rx="12" fill="#8f8cf5"/>
<rect x="40" y="152" width="265" height="4" rx="0" fill="#8f8cf5"/>
<circle cx="172.5" cy="214" r="30" fill="color-mix(in srgb,#8f8cf5 16%,#202027)" stroke="#8f8cf5" stroke-width="1.5"/>
<text x="172.5" y="223" fill="#8f8cf5" font-size="28" font-weight="800" text-anchor="middle">P</text>
<text x="172.5" y="282" fill="#ececf1" font-size="19" font-weight="800" text-anchor="middle">Plan</text>
<text x="172.5" y="308" fill="#c2c2cd" font-size="12.5" font-weight="400" text-anchor="middle">Approach + steps for any task.</text>
<rect x="91.6" y="330" width="161.8" height="22" rx="7" fill="color-mix(in srgb,#8f8cf5 16%,#17171c)" stroke="#8f8cf5" stroke-width="1"/>
<text x="172.5" y="345" fill="#8f8cf5" font-size="11" font-weight="600" text-anchor="middle">read-only · safe default</text>
<rect x="325" y="150" width="265" height="230" rx="12" fill="#202027" stroke="#343440" stroke-width="1"/>
<rect x="325" y="150" width="265" height="5" rx="12" fill="#4ea1ff"/>
<rect x="325" y="152" width="265" height="4" rx="0" fill="#4ea1ff"/>
<circle cx="457.5" cy="214" r="30" fill="color-mix(in srgb,#4ea1ff 16%,#202027)" stroke="#4ea1ff" stroke-width="1.5"/>
<text x="457.5" y="223" fill="#4ea1ff" font-size="28" font-weight="800" text-anchor="middle">R</text>
<text x="457.5" y="282" fill="#ececf1" font-size="19" font-weight="800" text-anchor="middle">Review</text>
<text x="457.5" y="308" fill="#c2c2cd" font-size="12.5" font-weight="400" text-anchor="middle">Claude critiques your git diff.</text>
<rect x="404.5" y="330" width="106.0" height="22" rx="7" fill="color-mix(in srgb,#4ea1ff 16%,#17171c)" stroke="#4ea1ff" stroke-width="1"/>
<text x="457.5" y="345" fill="#4ea1ff" font-size="11" font-weight="600" text-anchor="middle">no file pasting</text>
<rect x="610" y="150" width="265" height="230" rx="12" fill="#202027" stroke="#343440" stroke-width="1"/>
<rect x="610" y="150" width="265" height="5" rx="12" fill="#3fcbb0"/>
<rect x="610" y="152" width="265" height="4" rx="0" fill="#3fcbb0"/>
<circle cx="742.5" cy="214" r="30" fill="color-mix(in srgb,#3fcbb0 16%,#202027)" stroke="#3fcbb0" stroke-width="1.5"/>
<text x="742.5" y="223" fill="#3fcbb0" font-size="28" font-weight="800" text-anchor="middle">F</text>
<text x="742.5" y="282" fill="#ececf1" font-size="19" font-weight="800" text-anchor="middle">Fix</text>
<text x="742.5" y="308" fill="#c2c2cd" font-size="12.5" font-weight="400" text-anchor="middle">Make the change in one step.</text>
<rect x="643.0" y="330" width="199.0" height="22" rx="7" fill="color-mix(in srgb,#3fcbb0 16%,#17171c)" stroke="#3fcbb0" stroke-width="1"/>
<text x="742.5" y="345" fill="#3fcbb0" font-size="11" font-weight="600" text-anchor="middle">--dry previews · never commits</text>
<rect x="895" y="150" width="265" height="230" rx="12" fill="#202027" stroke="#343440" stroke-width="1"/>
<rect x="895" y="150" width="265" height="5" rx="12" fill="#e8bf69"/>
<rect x="895" y="152" width="265" height="4" rx="0" fill="#e8bf69"/>
<circle cx="1027.5" cy="214" r="30" fill="color-mix(in srgb,#e8bf69 16%,#202027)" stroke="#e8bf69" stroke-width="1.5"/>
<text x="1027.5" y="223" fill="#e8bf69" font-size="28" font-weight="800" text-anchor="middle">S</text>
<text x="1027.5" y="282" fill="#ececf1" font-size="19" font-weight="800" text-anchor="middle">Ship</text>
<text x="1027.5" y="308" fill="#c2c2cd" font-size="12.5" font-weight="400" text-anchor="middle">Plan → implement → review.</text>
<rect x="986.9" y="330" width="81.2" height="22" rx="7" fill="color-mix(in srgb,#e8bf69 16%,#17171c)" stroke="#e8bf69" stroke-width="1"/>
<text x="1027.5" y="345" fill="#e8bf69" font-size="11" font-weight="600" text-anchor="middle">one command</text>
</svg>